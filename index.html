<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 📱 모바일 반응형 웹의 핵심 
         - 이 태그가 누락되면 CSS에서 미디어 쿼리를 작성하더라도 스마트폰에서 데스크톱 화면이 축소되어 보인다. 모바일 기기에게 "화면 너비를 기기 너비에 맞춰라"고 명령하는 필수 태그이다. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개발자 포트폴리오</title>
    <!-- CSS 연결 -->
    <link rel="stylesheet" href="css/style.css">
    <!-- 🎨 디자인 에셋 1: Font Awesome (과제 조건상 아이콘/폰트 등 순수 디자인 소스 CDN은 허용됨) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 🎨 디자인 에셋 2: Google Fonts (마찬가지로 허용된 폰트 자원임) -->
    <link href="https://fonts.googleapis.com/css2?family=Orbit&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- 🌐 실무 표준: JS 지연 로딩 (defer) 
         - defer 사용 목적: 
         1) Render Blocking 방지: JS 다운로드 중에도 HTML 화면을 중단 없이 렌더링한다.
         2) DOM 요소 인식 보장: HTML 파싱이 완료된 후 JS가 실행되므로, DOM 요소를 찾지 못해 발생하는 에러를 예방한다. -->
    <script src="js/main.js" defer></script>
</head>

<!-- 🌙 다크모드 기본값 설정 (과제 요구사항 반영) 
     - 과제 요구사항의 '다크모드 토글' 기능을 반영하였다.
     - "dark" 설정 이유: 프로젝트의 기본 디자인 컨셉이 다크 모드이기 때문이다. (밝은 컨셉인 경우 "light" 적용)
     - HTML에 명시하는 이유 (실무 팁):
       기본값이 명시되지 않으면 JS 로딩 및 테마 계산 과정에서 짧은 순간 흰 화면이 노출된 후 깜빡이는 현상(FOUC)이 발생한다.
       이를 방지하기 위해 초기 렌더링 시점부터 다크모드를 강제하는 것이 실무 표준이다.
     - class="dark" 대신 data-theme="dark"를 사용하는 이유: 
       HTML5의 커스텀 속성(data-*)을 활용하면 JS 접근이 용이하며, 
       CSS에서도 body[data-theme="dark"]와 같이 상태를 명확히 분리하여 제어할 수 있다. -->
<body data-theme="dark">
    <!-- 
      =========================================
      💡 [HTML 마크업 핵심 개념 요약]
      1. id vs class
         - id: 페이지 내에서 절대 중복될 수 없는 유일한 식별자이다. 주로 JS에서 특정 요소를 제어하거나, 앵커 스크롤(#이동)의 목적지로 사용한다.
         - class: 여러 요소에 중복 사용 가능한 그룹 식별자이다. 주로 CSS를 통해 동일한 형태의 디자인(유니폼)을 한 번에 입힐 때 사용한다.
      2. 시맨틱 태그(section, article 등) vs div
         - section/article/header 등: 영역 자체에 '의미'를 부여한다. 구글 봇(SEO)이나 스크린 리더(접근성)가 문서의 구조를 파악하는 핵심 지표이다.
         - div: 의미가 없는 투명한 박스이다. 디자인 요소를 묶거나 Flex/Grid 등으로 레이아웃을 정렬하기 위한 껍데기 용도로만 사용한다.
      =========================================
    -->
    <!-- 🌐 실무 표준: 시맨틱 마크업 (header, nav) -->
    <header id="main-header">
        <div class="logo">Dev Portfolio</div>
        <nav id="main-nav">
            <ul class="nav-links">
                <li><a href="#hero">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
            </ul>
            <!-- 테마 토글 버튼 
                 * <i> 태그의 의미: 과거에는 이탤릭체(Italic)를 뜻했으나, 현대 실무에서는 Icon의 앞 글자 'i'를 차용하여 아이콘 폰트(Font Awesome 등) 전용 태그로 사용하는 것이 국룰(표준 관습)이다. 
                 * aria-label (웹 접근성): 텍스트 없이 아이콘만 있는 버튼의 경우, 화면 낭독기가 버튼의 용도를 파악할 수 있도록 기계용 이름표를 제공하는 실무 필수 속성이다. -->
            <button id="theme-toggle" class="theme-btn" aria-label="테마 전환"><i class="fas fa-moon"></i></button>
        </nav>
        <!-- 모바일 햄버거 메뉴 
             * 햄버거 메뉴 명칭 유래: 가로줄 3개(≡)가 빵-패티-빵 형태의 햄버거와 유사하여 붙여진 글로벌 공식 명칭이다. 
             * (참고: 세로 점 3개는 '케밥 메뉴', 가로 점 3개는 '미트볼 메뉴'라 부른다.) -->
        <button id="mobile-menu-btn" class="hamburger" aria-label="메뉴 열기">
            <i class="fas fa-bars"></i>
        </button>
    </header>

    <main>
        <!-- Hero Section 
             * 'Hero' 명칭 유래: 웹사이트 접속 시 가장 먼저 시선을 사로잡는 대문 영역이다. 
               영화 업계에서 메인 소품을 'Hero Prop'이라 부르던 것에서 유래하여, 유저의 이탈을 막는 '주인공' 역할을 한다는 의미를 담고 있다. -->
        <section id="hero" class="hero-section">
            <div class="hero-content">
                <!-- 
                  * <h1> (Heading): 페이지의 핵심 대제목을 뜻한다. (숫자가 작을수록 중요도가 높다.)
                  * <p> (Paragraph): 제목에 부연되는 일반적인 문단(본문 줄글)을 뜻한다. 
                -->
                <h1 class="glow-text">게임 소프트웨어 개발자입니다</h1>
                <p>게임 클라이언트 및 시스템 로직을 구현합니다</p>
                <a href="#projects" class="cta-button">프로젝트 보기</a>
            </div>
        </section>

        <!-- About Section -->
        <section id="about" class="about-section">
            <h2>About Me</h2>
            <article class="about-card">
                <p>게임 소프트웨어 개발 포트폴리오입니다.<br>요구사항에 맞추어 시스템을 설계하고, 지정된 기능이 정상적으로 동작하도록 코드를 작성합니다.</p>
            </article>
        </section>

        <!-- Projects Section (API Target) -->
        <section id="projects" class="projects-section">
            <h2>Projects</h2>
            <!-- 카테고리 탭 (7단계 필터링 대비) 
                 * data-* (커스텀 데이터 속성): 개발자가 HTML 태그에 임의의 데이터를 몰래 저장해둘 때 사용하는 HTML5 표준 속성이다.
                 * 동작 원리: JS에서 버튼이 클릭될 때 이 속성값(all, game, web)을 읽어와서, 해당 카테고리에 맞는 프로젝트만 골라내어 화면에 필터링(렌더링)한다. -->
            <div id="filter-tabs" class="filter-tabs">
                <button class="filter-btn active" data-filter="all">전체</button>
                <button class="filter-btn" data-filter="game">게임</button>
                <button class="filter-btn" data-filter="web">웹</button>
            </div>
            
            <!-- API 데이터 렌더링 영역 -->
            <div id="project-grid" class="project-grid">
                <!-- JS가 카드를 여기에 주입한다. -->
                <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> 프로젝트 데이터를 불러오는 중...</div>
            </div>
        </section>


    </main>

    <!-- 🌐 실무 표준: 시맨틱 마크업 (footer) -->
    <footer>
        <p>&copy; 2026 Developer Portfolio. All rights reserved.</p>
    </footer>

    <!-- Scroll to Top Button 
         * 폰트어썸(Font Awesome) 클래스명 작성 규칙:
           - 첫 번째 단어(fas, far, fab): 아이콘의 스타일을 결정한다. (fas: 꽉 찬 형태, far: 테두리만 있는 형태, fab: 브랜드 로고)
           - 두 번째 단어(fa-이름): 사용할 아이콘의 고유 이름이다. (예: fa-space-shuttle은 우주선 모양)
           - 브라우저가 이 클래스를 인식하면, 해당 태그 자리에 미리 디자인된 벡터 아이콘을 자동으로 렌더링한다. -->
    <button id="scroll-top-btn" class="scroll-top" aria-label="위로 가기">
        <i class="fas fa-space-shuttle"></i>
    </button>
</body>
</html>
